# Build, type-check, unit-test and e2e-test on every push/PR.
name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

# A newer push to the same ref cancels the older run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build · types · unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        # vendors/kkrpc's own `prepare` script shells out to `deno` to generate
        # ambient Deno types, which this job doesn't have and doesn't need —
        # uniview only consumes kkrpc's built dist, never its Deno declarations.
        # CF_PAGES=1 is kkrpc's own upstream escape hatch for exactly this case
        # (see vendors/kkrpc/packages/kkrpc/scripts/prepare.ts).
        run: pnpm install --frozen-lockfile
        env:
          CF_PAGES: "1"

      - name: Build
        run: pnpm build

      - name: Check types
        run: pnpm check-types

      - name: Unit tests
        run: pnpm test

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      # The bridge server runs on Bun.serve; the e2e runner is a Bun script.
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        # See the same step in the build-and-test job: skips vendors/kkrpc's
        # `deno`-dependent prepare script, which this job doesn't need either.
        run: pnpm install --frozen-lockfile
        env:
          CF_PAGES: "1"

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run e2e
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: .reports/
          retention-days: 7
          if-no-files-found: ignore

  swift-hosts:
    name: Swift host tests (AppKit)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run AppKit host unit tests
        run: bash examples/host-appkit-demo/tests/run.sh
